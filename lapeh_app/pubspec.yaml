name: lapeh_app
description: Lapeh — Delivery Dispatch Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Auth
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  # State management & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2

  # Media
  image_picker: ^1.1.2

  # Push notifications
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6

  # Utilities
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logo_white.png
